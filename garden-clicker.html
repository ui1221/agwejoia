<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おそらのはたけ 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --soil2: #6d4c41;
    --accent: #f06292;
    --accent2: #ab47bc;
    --green: #43a047;
    --text: #3e2723;
    --card: rgba(255,255,255,0.82);
    --shadow: 0 4px 24px rgba(80,40,20,0.13);
    --radius: 20px;
  }

  /* 長押し誤作動を全面ブロック */
  * {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    /* 背景はJSで動的に切り替える */
    background: linear-gradient(180deg, #546e7a 0%, #78909c 35%, #90a4ae 65%, #b0bec5 100%);
    transition: background 4s ease;
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* 流れる絵文字 */
  .clouds {
    position: fixed; top: 0; left: 0; width: 100%; height: 140px;
    pointer-events: none; z-index: 0;
  }
  .cloud {
    position: absolute; font-size: 2.2rem; opacity: 0.75;
    animation: drift linear infinite;
  }
  .cloud:nth-child(1) { top: 8px;  animation-duration: 26s; animation-delay: 0s; }
  .cloud:nth-child(2) { top: 40px; animation-duration: 38s; animation-delay: -14s; font-size: 1.6rem; }
  .cloud:nth-child(3) { top: 14px; animation-duration: 31s; animation-delay: -22s; }
  .cloud:nth-child(4) { top: 55px; animation-duration: 44s; animation-delay: -8s;  font-size: 1.4rem; }
  @keyframes drift {
    from { transform: translateX(-80px); }
    to   { transform: translateX(calc(100vw + 80px)); }
  }

  /* メインエリア */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: 16px 12px 160px;
  }

  header { text-align: center; padding: 18px 0 10px; }
  header h1 {
    font-size: 1.7rem; font-weight: 900; color: var(--soil2);
    text-shadow: 0 2px 0 rgba(255,255,255,0.6); letter-spacing: 0.04em;
  }
  header .subtitle { font-size: 0.82rem; color: #795548; margin-top: 2px; }

  /* 種カウンター */
  .seed-bar {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .seed-count {
    font-size: 2rem; font-weight: 900; color: var(--soil2);
    line-height: 1.1;
  }
  .seed-sub {
    font-size: 0.78rem; font-weight: 700; color: var(--green);
    margin-top: 1px; min-height: 1em;
  }
  .seed-label { font-size: 0.75rem; color: #795548; margin-top: 1px; }
  .per-sec {
    font-size: 0.75rem; color: var(--green); font-weight: 700;
    background: #e8f5e9; border-radius: 30px; padding: 4px 12px;
    text-align: right;
  }

  /* タップボタン */
  .tap-area { display: flex; justify-content: center; margin-bottom: 18px; }
  .tap-btn {
    background: none; border: none; cursor: pointer;
    font-size: 5.5rem; line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(80,40,20,0.18));
    transition: transform 0.1s cubic-bezier(.3,1.8,.5,1), filter 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    position: relative; padding: 8px; border-radius: 50%;
  }
  .tap-btn:active {
    transform: scale(0.88);
    filter: drop-shadow(0 2px 4px rgba(80,40,20,0.10));
  }
  .tap-btn .tap-hint {
    position: absolute; bottom: -18px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem; color: #a1887f; white-space: nowrap; font-weight: 700;
  }

  /* フロートテキスト */
  .float-text {
    position: fixed; pointer-events: none;
    font-size: 1.4rem; font-weight: 900; color: var(--accent);
    text-shadow: 0 2px 6px rgba(0,0,0,0.12);
    animation: floatUp 0.9s ease-out forwards; z-index: 999;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.7); }
  }

  /* ========== ボトムバー ========== */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(255,255,255,0.96);
    border-top: 2px solid rgba(109,76,65,0.12);
    box-shadow: 0 -4px 20px rgba(80,40,20,0.13);
    padding: 10px 16px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .bottom-bar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .bottom-bar-label {
    font-size: 0.8rem; font-weight: 700; color: #795548;
    display: flex; align-items: center; gap: 6px;
  }
  .new-badge {
    background: var(--accent); color: white;
    font-size: 0.65rem; font-weight: 900;
    border-radius: 20px; padding: 1px 7px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }
  .bottom-bar-arrow { font-size: 0.85rem; color: #a1887f; transition: transform 0.3s; }
  .bottom-bar-arrow.open { transform: rotate(180deg); }

  .icon-strip { display: flex; flex-wrap: wrap; gap: 8px; }
  .icon-chip {
    display: flex; flex-direction: column; align-items: center;
    gap: 1px; min-width: 44px; position: relative;
    touch-action: manipulation;
    cursor: pointer;
  }
  .icon-chip .chip-icon { font-size: 1.8rem; line-height: 1.2; }
  .icon-chip .chip-count {
    font-size: 0.6rem; font-weight: 700; color: #795548;
    background: #f5f5f5; border-radius: 10px; padding: 0 5px;
    min-width: 24px; text-align: center;
  }
  .icon-chip.empty .chip-icon { opacity: 0.25; filter: grayscale(1); }
  .icon-chip.empty .chip-count { color: #bbb; background: none; }
  .icon-chip.maxed .chip-icon { opacity: 0.4; }
  .icon-chip.maxed .chip-count { background: #e0e0e0; color: #9e9e9e; }

  /* 所持済み施設：ゆっくりゆらゆら */
  .icon-chip.owned .chip-icon {
    animation: sway 4s ease-in-out infinite;
  }
  @keyframes sway {
    0%,100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }

  /* 新しく買える施設：小さくぽんと跳ねる */
  .icon-chip.can-afford .chip-icon {
    animation: smallBounce 2.4s ease-in-out infinite;
  }
  @keyframes smallBounce {
    0%,70%,100% { transform: translateY(0); }
    80%          { transform: translateY(-6px); }
    90%          { transform: translateY(-2px); }
  }

  /* 新解禁：金色に光る */
  .icon-chip.newly-unlocked .chip-icon {
    opacity: 1; filter: none;
    animation: newGlow 2.4s ease-in-out infinite;
  }
  @keyframes newGlow {
    0%,100% { filter: drop-shadow(0 0 2px gold); }
    50%      { filter: drop-shadow(0 0 8px gold) brightness(1.25); }
  }
  .icon-chip.newly-unlocked::after {
    content: '！';
    position: absolute; top: -4px; right: -2px;
    background: var(--accent); color: white;
    font-size: 0.6rem; font-weight: 900;
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 1.6s ease-in-out infinite;
  }

  /* バー全体の演出は廃止（目に優しくないため） */

  /* ========== ボトムシート ========== */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 300;
    opacity: 0; pointer-events: none; transition: opacity 0.35s;
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }

  .sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: #fffdf9; border-radius: 28px 28px 0 0;
    box-shadow: 0 -8px 40px rgba(80,40,20,0.18);
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(.32,1.2,.5,1);
    max-height: 80vh; display: flex; flex-direction: column;
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 5px; background: #d7c4bb; border-radius: 3px;
    margin: 12px auto 0; flex-shrink: 0;
  }
  .sheet-title {
    font-size: 0.9rem; font-weight: 900; color: var(--soil2);
    text-align: center; padding: 10px 0 12px; flex-shrink: 0;
  }
  .sheet-scroll {
    overflow-y: auto; padding: 0 14px 24px;
    -webkit-overflow-scrolling: touch;
  }

  /* アップグレードセクション */
  .upgrade-section-title {
    font-size: 0.78rem; font-weight: 700; color: #6d4c41;
    letter-spacing: 0.05em; margin-bottom: 8px; padding-left: 2px;
  }
  .upgrade-list {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
  }
  .upgrade-chip {
    background: linear-gradient(135deg, #fff9c4, #ffe082);
    border: 2px solid #ffd54f;
    border-radius: 14px; padding: 7px 12px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s;
    animation: popIn 0.3s cubic-bezier(.3,1.8,.5,1);
  }
  .upgrade-chip:active { transform: scale(0.93); }
  .upgrade-chip.cannot-afford { opacity: 0.55; }
  .upgrade-chip .up-icon { font-size: 1.3rem; line-height: 1; }
  .upgrade-chip .up-info { display: flex; flex-direction: column; gap: 1px; }
  .upgrade-chip .up-name { font-size: 0.72rem; font-weight: 700; color: #5d4037; }
  .upgrade-chip .up-cost { font-size: 0.65rem; font-weight: 700; color: #e65100; }

  .sheet-divider {
    font-size: 0.78rem; font-weight: 700; color: #6d4c41;
    letter-spacing: 0.05em; margin-bottom: 8px; padding-left: 2px;
  }

  .plots { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .plot-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 10px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; text-align: center;
  }
  .plot-card.new-card { animation: popIn 0.4s cubic-bezier(.3,1.8,.5,1); }
  .plot-card.can-afford { border-color: var(--accent); background: rgba(255,255,255,0.97); }
  .plot-card.cannot-afford { opacity: 0.68; }
  .plot-card.maxed-card { opacity: 0.5; cursor: default; }
  .plot-card:not(.maxed-card):active { transform: scale(0.94); }

  .plot-icon { font-size: 2rem; line-height: 1.2; }
  .plot-name { font-size: 0.85rem; font-weight: 700; color: var(--soil2); }
  .plot-rate { font-size: 0.7rem; color: var(--green); font-weight: 700; }
  .plot-cost {
    font-size: 0.76rem; font-weight: 700; color: var(--accent);
    background: #fce4ec; border-radius: 20px; padding: 2px 10px; margin-top: 2px;
  }
  .plot-cost.disabled { color: #aaa; background: #f0f0f0; }
  .plot-cost.maxed-label { color: #9e9e9e; background: #eeeeee; }
  .plot-owned { font-size: 0.68rem; color: #795548; font-weight: 700; }
  .plot-upgrade { font-size: 0.65rem; color: #ff8f00; font-weight: 700; }

  @keyframes popIn {
    0%   { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* トースト */
  .toast {
    position: fixed; bottom: 120px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--soil2); color: white;
    border-radius: 30px; padding: 12px 24px;
    font-size: 0.9rem; font-weight: 700;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2); z-index: 1000;
    transition: transform 0.4s cubic-bezier(.3,1.4,.5,1), opacity 0.4s;
    opacity: 0; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="clouds" id="clouds">
  <span class="cloud">🌧️</span>
  <span class="cloud">☁️</span>
  <span class="cloud">🌧️</span>
  <span class="cloud">💧</span>
</div>

<div class="wrapper">
  <header>
    <h1>🌸 おそらのはたけ 🥕</h1>
    <p class="subtitle">たねをあつめて、はたけをそだてよう</p>
  </header>

  <div class="seed-bar">
    <div>
      <div class="seed-count" id="seedCount">🌱 0</div>
      <div class="seed-sub" id="seedSub"></div>
      <div class="seed-label">たね</div>
    </div>
    <div class="per-sec" id="perSec">+0<br>/ びょう</div>
  </div>

  <div class="tap-area">
    <button class="tap-btn" id="tapBtn" onclick="tap(event)" ontouchstart="">
      🌧️
      <span class="tap-hint">タップ！</span>
    </button>
  </div>
</div>

<div class="bottom-bar" id="bottomBar" onclick="openSheet()">
  <div class="bottom-bar-header">
    <div class="bottom-bar-label">
      🏡 はたけをかう
      <span class="new-badge" id="newBadge" style="display:none">あたらしい！</span>
    </div>
    <div class="bottom-bar-arrow" id="barArrow">▲</div>
  </div>
  <div class="icon-strip" id="iconStrip"></div>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">🏡 はたけをかう</div>
  <div class="sheet-scroll">
    <div id="upgradeSection" style="display:none">
      <div class="upgrade-section-title">⭐ つよくする</div>
      <div class="upgrade-list" id="upgradeList"></div>
    </div>
    <div class="sheet-divider">🏡 しせつ</div>
    <div class="plots" id="plotList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 施設定義（バランス調整済み）=====
const PLOTS = [
  { id: 'pot',      name: 'うえきばち',    icon: '🪴', perSec: 1,      baseCost: 10 },
  { id: 'flower',   name: 'かだん',        icon: '🌸', perSec: 5,      baseCost: 100 },
  { id: 'veggie',   name: 'やさいばたけ',  icon: '🥕', perSec: 20,     baseCost: 1000 },
  { id: 'tree',     name: 'くだものの木',  icon: '🌳', perSec: 80,     baseCost: 12000 },
  { id: 'garden',   name: 'おにわ',        icon: '🏡', perSec: 300,    baseCost: 150000 },   // ← ここから急勾配
  { id: 'pond',     name: 'いけ',          icon: '🪷', perSec: 1200,   baseCost: 2000000 },
  { id: 'neighbor', name: 'となりのにわ',  icon: '🏘️', perSec: 5000,   baseCost: 30000000 },
  { id: 'honey',    name: 'はちみつ',      icon: '🍯', perSec: 20000,  baseCost: 500000000 },
  { id: 'mountain', name: 'やまのはたけ',  icon: '🗻', perSec: 80000,  baseCost: 8000000000 },
  { id: 'rainbow',  name: 'にじのその',    icon: '🌈', perSec: 300000, baseCost: 100000000000 },
];

// アップグレードティア定義（閾値・コスト倍率・ラベル）
const UPGRADE_TIERS = [
  { threshold: 1,  costMult: 5,    label: 'Lv.1' },
  { threshold: 5,  costMult: 50,   label: 'Lv.2' },
  { threshold: 25, costMult: 500,  label: 'Lv.3' },
  { threshold: 50, costMult: 5000, label: 'Lv.4' },
];
const MAX_OWNED = 50;

// ===== 背景ステージ定義 =====
const STAGES = [
  { // 0: 1種 — 雨の曇り空
    bg: 'linear-gradient(180deg, #546e7a 0%, #78909c 35%, #90a4ae 65%, #b0bec5 100%)',
    emojis: ['🌧️','☁️','🌧️','💧'],
  },
  { // 1: 2〜3種 — 薄曇り
    bg: 'linear-gradient(180deg, #7986cb 0%, #9fa8da 35%, #c5cae9 65%, #e8eaf6 100%)',
    emojis: ['⛅','🌥️','☁️','🌥️'],
  },
  { // 2: 4〜5種 — 晴れ間
    bg: 'linear-gradient(180deg, #29b6f6 0%, #81d4fa 35%, #b3e5fc 65%, #e1f5fe 100%)',
    emojis: ['☀️','🌤️','🌱','☀️'],
  },
  { // 3: 6〜7種 — 春の陽気
    bg: 'linear-gradient(180deg, #26c6da 0%, #80deea 35%, #ffe082 65%, #f1f8e9 100%)',
    emojis: ['🌸','🌼','🦋','🌸'],
  },
  { // 4: 8〜9種 — 黄金の午後
    bg: 'linear-gradient(180deg, #ffa726 0%, #ffcc02 35%, #ffe57f 65%, #fff8e1 100%)',
    emojis: ['🌺','✨','🌟','🌺'],
  },
  { // 5: 10種全解禁 — 虹の空
    bg: 'linear-gradient(180deg, #ce93d8 0%, #90caf9 35%, #ffe082 65%, #f8bbd0 100%)',
    emojis: ['🌈','⭐','🎉','✨'],
  },
];

function getStageIndex(unlockedCount) {
  if (unlockedCount >= 10) return 5;
  if (unlockedCount >= 8)  return 4;
  if (unlockedCount >= 6)  return 3;
  if (unlockedCount >= 4)  return 2;
  if (unlockedCount >= 2)  return 1;
  return 0;
}

let currentStageIdx = -1;
function applyStage(idx) {
  if (idx === currentStageIdx) return;
  currentStageIdx = idx;
  const s = STAGES[idx];
  document.body.style.background = s.bg;
  const clouds = document.getElementById('clouds');
  const spans = clouds.querySelectorAll('.cloud');
  s.emojis.forEach((e, i) => { if (spans[i]) spans[i].textContent = e; });
  // タップボタンも最初だけ同期
  if (idx === 0) {
    const btn = document.getElementById('tapBtn');
    if (btn.childNodes[0]) btn.childNodes[0].textContent = '🌧️';
  }
}

// ===== 状態 =====
const OFFLINE_CAP_SEC = 2 * 60 * 60;
let state = { seeds: 0, plots: {}, upgrades: {} };
let sheetOpen = false;
let newlyUnlockedIds = new Set();

function save() {
  try {
    localStorage.setItem('garden_save', JSON.stringify(state));
    localStorage.setItem('garden_saved_at', Date.now().toString());
  } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem('garden_save');
    if (d) state = JSON.parse(d);
  } catch(e){}
}
function applyOfflineIncome() {
  const savedAt = parseInt(localStorage.getItem('garden_saved_at') || '0', 10);
  if (!savedAt) return;
  const elapsed = Math.min((Date.now() - savedAt) / 1000, OFFLINE_CAP_SEC);
  if (elapsed < 10) return;
  const gained = Math.floor(getTotalPerSec() * elapsed);
  if (gained <= 0) return;
  state.seeds += gained;
  const mins = Math.floor(elapsed / 60);
  const timeStr = mins >= 60 ? '2じかんぶん' : mins + 'ふんぶん';
  setTimeout(() => showToast('🌙 おるすのあいだに ' + timeStr + ' +' + formatNum(gained) + 'たね！'), 800);
}
load();
applyOfflineIncome();

// ===== ゲームロジック =====
function getCost(plot) {
  return Math.floor(plot.baseCost * Math.pow(1.15, state.plots[plot.id] || 0));
}
// 購入済みアップグレードから倍率を計算
function getMultiplier(plotId) {
  return UPGRADE_TIERS.reduce((mult, tier) => {
    return state.upgrades[plotId + '_' + tier.threshold] ? mult * 2 : mult;
  }, 1);
}

// 購入可能なアップグレード一覧（解禁済み＆未購入）
function getAvailableUpgrades() {
  const result = [];
  PLOTS.forEach(plot => {
    const owned = state.plots[plot.id] || 0;
    UPGRADE_TIERS.forEach(tier => {
      const key = plot.id + '_' + tier.threshold;
      if (owned >= tier.threshold && !state.upgrades[key]) {
        result.push({
          key,
          plot,
          tier,
          cost: Math.floor(plot.baseCost * tier.costMult),
        });
      }
    });
  });
  return result;
}

function buyUpgrade(key) {
  const avail = getAvailableUpgrades().find(u => u.key === key);
  if (!avail) return;
  if (state.seeds < avail.cost) return;
  state.seeds -= avail.cost;
  state.upgrades[key] = true;
  showToast(avail.plot.icon + ' ' + avail.plot.name + ' がパワーアップ！ ×2');
  save();
  update();
}
function getUnlockedPlots() {
  return PLOTS.filter((plot, i) => {
    if (i === 0) return true;
    return (state.plots[PLOTS[i - 1].id] || 0) >= 1;
  });
}
function getTotalPerSec() {
  return PLOTS.reduce((sum, p) => {
    const owned = state.plots[p.id] || 0;
    return sum + p.perSec * owned * getMultiplier(p.id);
  }, 0);
}
function getPerClick() {
  return Math.pow(2, getUnlockedPlots().length - 1);
}

function tap(e) {
  const pc = getPerClick();
  state.seeds += pc;
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = '+' + formatNum(pc) + '🌱';
  el.style.left = (e.clientX - 20) + 'px';
  el.style.top  = (e.clientY - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
  update();
}

function buyPlot(id) {
  const plot = PLOTS.find(p => p.id === id);
  const owned = state.plots[id] || 0;
  if (owned >= MAX_OWNED) return;
  const cost = getCost(plot);
  if (state.seeds < cost) return;
  state.seeds -= cost;
  state.plots[id] = owned + 1;

  // 新アップグレード解禁チェック
  UPGRADE_TIERS.forEach(tier => {
    if (owned < tier.threshold && state.plots[id] >= tier.threshold) {
      showToast('⭐ ' + plot.name + ' の強化が解禁！ ショップを確認してね');
    }
  });
  if (state.plots[id] >= MAX_OWNED) {
    showToast(plot.icon + ' ' + plot.name + ' がさいだいになった！');
  }

  checkUnlock();
  save();
  update();
}

let prevUnlockedCount = 0;
function checkUnlock() {
  const unlocked = getUnlockedPlots();
  if (unlocked.length > prevUnlockedCount) {
    for (let i = prevUnlockedCount; i < unlocked.length; i++) {
      const p = unlocked[i];
      newlyUnlockedIds.add(p.id);
      const newPc = Math.pow(2, unlocked.length - 1);
      showToast(p.icon + ' ' + p.name + ' が解禁！ タップが×' + newPc + 'に！');
    }
    prevUnlockedCount = unlocked.length;
  }
}

let lastMilestone = 0;
const milestones = [100, 500, 2000, 10000, 100000, 1000000, 10000000, 100000000, 1000000000];
function checkMilestone() {
  milestones.forEach(m => {
    if (state.seeds >= m && m > lastMilestone) {
      lastMilestone = m;
      showToast('🎉 ' + formatNum(m) + 'たね たまったよ！');
    }
  });
}

// ===== 数字フォーマット =====
function formatNum(n) {
  if (n >= 1e12) return (n / 1e12).toFixed(1) + 'ちょう';
  if (n >= 1e8)  return (n / 1e8).toFixed(1)  + 'おく';
  return Math.floor(n).toLocaleString('ja-JP');
}

// メインカウンター：大きい単位 + 下の桁を2行で表示
function formatSeedDisplay(n) {
  if (n >= 1e12) {
    const main = Math.floor(n / 1e12) + 'ちょう';
    const sub  = '+ ' + Math.floor((n % 1e12) / 1e8).toLocaleString('ja-JP') + 'おく';
    return { main, sub };
  }
  if (n >= 1e8) {
    const main = Math.floor(n / 1e8) + 'おく';
    const sub  = '+ ' + Math.floor((n % 1e8)).toLocaleString('ja-JP');
    return { main, sub };
  }
  return { main: Math.floor(n).toLocaleString('ja-JP'), sub: '' };
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function openSheet() {
  sheetOpen = true;
  document.getElementById('sheet').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('barArrow').classList.add('open');
  newlyUnlockedIds.clear();
  document.getElementById('newBadge').style.display = 'none';
}
function closeSheet() {
  sheetOpen = false;
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('barArrow').classList.remove('open');
}

// ===== 画面更新 =====
function update() {
  const seeds = Math.floor(state.seeds);
  const { main, sub } = formatSeedDisplay(seeds);
  document.getElementById('seedCount').textContent = '🌱 ' + main;
  document.getElementById('seedSub').textContent   = sub;
  document.getElementById('perSec').textContent    = '+' + formatNum(getTotalPerSec()) + ' / びょう';

  const unlocked = getUnlockedPlots();

  // 背景ステージ更新
  applyStage(getStageIndex(unlocked.length));

  // タップボタンアイコン
  const tapBtn = document.getElementById('tapBtn');
  const stageEmojis = STAGES[currentStageIdx].emojis;
  tapBtn.childNodes[0].textContent = unlocked.length > 1
    ? unlocked[unlocked.length - 1].icon
    : stageEmojis[0];

  // ---- アイコンストリップ ----
  const strip = document.getElementById('iconStrip');
  strip.innerHTML = '';
  let hasAffordable = false;

  unlocked.forEach(plot => {
    const owned = state.plots[plot.id] || 0;
    const isMaxed = owned >= MAX_OWNED;
    const canAfford = !isMaxed && seeds >= getCost(plot);
    if (canAfford) hasAffordable = true;
    const isNew = newlyUnlockedIds.has(plot.id);

    const chip = document.createElement('div');
    chip.className = 'icon-chip' +
      (isMaxed ? ' maxed' :
       owned === 0 && !isNew ? ' empty' :
       isNew ? ' newly-unlocked' :
       canAfford ? ' can-afford' :
       owned > 0 ? ' owned' : '');
    chip.innerHTML = `
      <span class="chip-icon">${plot.icon}</span>
      <span class="chip-count">${isMaxed ? 'MAX' : owned > 0 ? owned + 'こ' : '－'}</span>
    `;
    chip.onclick = (e) => { e.stopPropagation(); buyPlot(plot.id); };
    strip.appendChild(chip);
  });

  // ---- アップグレードセクション ----
  const availUpgrades = getAvailableUpgrades();
  const upgradeSection = document.getElementById('upgradeSection');
  const upgradeList = document.getElementById('upgradeList');
  if (availUpgrades.length > 0) {
    upgradeSection.style.display = '';
    upgradeList.innerHTML = '';
    availUpgrades.forEach(u => {
      const canAfford = seeds >= u.cost;
      const chip = document.createElement('div');
      chip.className = 'upgrade-chip' + (canAfford ? '' : ' cannot-afford');
      chip.innerHTML = `
        <span class="up-icon">${u.plot.icon}</span>
        <div class="up-info">
          <span class="up-name">${u.plot.name} ×2 (${u.tier.label})</span>
          <span class="up-cost">🌱${formatNum(u.cost)}</span>
        </div>
      `;
      chip.onclick = () => buyUpgrade(u.key);
      upgradeList.appendChild(chip);
    });
  } else {
    upgradeSection.style.display = 'none';
  }

  // バッジ＆バー演出
  const hasUpgrade = availUpgrades.some(u => seeds >= u.cost);
  const badge = document.getElementById('newBadge');
  const bar   = document.getElementById('bottomBar');
  badge.style.display = newlyUnlockedIds.size > 0 ? '' : 'none';
  bar.classList.remove('has-action');

  // ---- シート内グリッド ----
  const list = document.getElementById('plotList');
  const existingIds = new Set(Array.from(list.querySelectorAll('.plot-card')).map(el => el.dataset.id));

  unlocked.forEach(plot => {
    const owned = state.plots[plot.id] || 0;
    const isMaxed = owned >= MAX_OWNED;
    const cost = getCost(plot);
    const canAfford = !isMaxed && seeds >= cost;
    const mult = getMultiplier(plot.id);

    let card = list.querySelector(`[data-id="${plot.id}"]`);
    const isNew = !existingIds.has(plot.id);
    if (!card) {
      card = document.createElement('div');
      card.dataset.id = plot.id;
      card.onclick = () => buyPlot(plot.id);
      list.appendChild(card);
    }

    card.className = 'plot-card' +
      (isNew ? ' new-card' : '') +
      (isMaxed ? ' maxed-card' :
       canAfford ? ' can-afford' : ' cannot-afford');

    card.innerHTML = `
      <div class="plot-icon">${plot.icon}</div>
      <div class="plot-name">${plot.name}</div>
      <div class="plot-rate">+${formatNum(plot.perSec * mult)}/びょう</div>
      ${owned > 0 ? `<div class="plot-owned">もってる：${owned}こ</div>` : ''}
      ${mult > 1 ? `<div class="plot-upgrade">⭐×${mult}</div>` : ''}
      <div class="plot-cost ${isMaxed ? 'maxed-label' : canAfford ? '' : 'disabled'}">
        ${isMaxed ? 'さいだい' : '🌱' + formatNum(cost)}
      </div>
    `;
  });

  const unlockedIds = new Set(unlocked.map(p => p.id));
  list.querySelectorAll('.plot-card').forEach(card => {
    if (!unlockedIds.has(card.dataset.id)) card.remove();
  });
}

prevUnlockedCount = getUnlockedPlots().length;
applyStage(getStageIndex(prevUnlockedCount));

let lastTime = performance.now();
function gameLoop(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  state.seeds += getTotalPerSec() * dt;
  checkMilestone();
  if (Math.floor(now / 500) !== Math.floor((now - dt * 1000) / 500)) save();
  requestAnimationFrame(gameLoop);
}

setInterval(update, 200);
update();
requestAnimationFrame(gameLoop);
</script>
