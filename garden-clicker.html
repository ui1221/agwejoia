<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>おそらのはたけ 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --soil2: #6d4c41;
    --accent: #f06292;
    --accent2: #ab47bc;
    --green: #43a047;
    --text: #3e2723;
    --card: rgba(255,255,255,0.82);
    --shadow: 0 4px 24px rgba(80,40,20,0.13);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(180deg, #546e7a 0%, #78909c 35%, #90a4ae 65%, #b0bec5 100%);
    transition: background 4s ease;
    min-height: 100vh; color: var(--text); overflow-x: hidden;
  }

  /* はたけレイヤー（施設アイコン＋流れる絵文字） */
  .garden-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
  .cloud  { position: absolute; font-size: 2.2rem; opacity: 0.75; animation: drift linear infinite; }
  @keyframes drift { from { transform: translateX(-80px); } to { transform: translateX(calc(100vw + 80px)); } }

  /* 施設アイコン（はたけビュー） */
  .garden-icon {
    position: absolute; line-height: 1; opacity: 0.82;
  }

  .wrapper {
    position: relative; z-index: 1; max-width: 520px; margin: 0 auto;
    padding: 8px 12px 16px;
    min-height: calc(100dvh - 110px - env(safe-area-inset-bottom));
    display: flex; flex-direction: column;
    pointer-events: none; /* 背景アイコンのタッチを通す */
  }
  /* ラッパー内のインタラクティブ要素は個別に有効化 */
  .seed-bar, .tap-btn, .prestige-badge { pointer-events: auto; }

  /* 種カウンター */
  .seed-bar {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
  }
  .seed-count { font-size: 2rem; font-weight: 900; color: var(--soil2); line-height: 1.1; }
  .seed-sub   { font-size: 0.92rem; font-weight: 700; color: var(--green); margin-top: 1px; min-height: 1em; }
  .seed-label { font-size: 0.88rem; color: #795548; margin-top: 1px; }
  .per-sec    { font-size: 0.9rem; color: var(--green); font-weight: 700; background: #e8f5e9; border-radius: 30px; padding: 4px 12px; text-align: right; }

  /* ほしのたねピル（種カウンター内） */
  .star-pill {
    background: rgba(255,235,59,0.15);
    border: 1.5px solid rgba(255,200,0,0.35);
    border-radius: 20px; padding: 4px 13px;
    font-size: 0.92rem; font-weight: 900; color: #bf6a00;
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .star-pill.can-prestige { animation: starGlow 2.6s ease-in-out infinite; }
  @keyframes starGlow {
    0%,100% { box-shadow: 0 0 3px rgba(255,200,0,0.2); border-color: rgba(255,200,0,0.4); }
    50%      { box-shadow: 0 0 12px rgba(255,200,0,0.65); border-color: rgba(255,200,0,0.85); background: rgba(255,235,59,0.28); }
  }
  .star-pill.hidden { display: none; }

  /* 転生確認モーダル */
  .prestige-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .prestige-overlay.hidden { display: none; }
  .prestige-modal {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 24px; border: 2px solid #ffd700;
    padding: 28px 24px; color: white; text-align: center; max-width: 340px; width: 100%;
  }
  .prestige-modal h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 12px; }
  .prestige-modal p  { font-size: 0.95rem; line-height: 1.7; margin-bottom: 16px; opacity: 0.9; }
  .prestige-modal .gain-text { color: #ffd700; font-size: 1.05rem; font-weight: 900; margin-bottom: 20px; }
  .modal-btn {
    display: block; width: 100%; padding: 12px;
    border-radius: 14px; border: none; font-family: inherit;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    touch-action: manipulation; margin-bottom: 10px;
  }
  .modal-btn.confirm { background: linear-gradient(135deg, #ffd700, #ffb300); color: #1a1a2e; }
  .modal-btn.cancel  { background: rgba(255,255,255,0.15); color: white; }

  /* インフォモーダル（アップグレード確認・施設統計 共通） */
  .info-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .info-overlay.hidden { display: none; }
  .info-modal {
    background: #fffdf9; border-radius: 24px;
    padding: 28px 24px; text-align: center; max-width: 320px; width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }
  .info-icon  { font-size: 3rem; margin-bottom: 6px; }
  .info-title { font-size: 1.1rem; font-weight: 900; color: var(--soil2); margin-bottom: 14px; }
  .info-effect { font-size: 0.95rem; color: #ff8f00; font-weight: 700; margin-bottom: 6px; }
  .info-cost  {
    font-size: 1rem; font-weight: 900; color: var(--accent);
    background: #fce4ec; border-radius: 20px; padding: 6px 18px;
    display: inline-block; margin-bottom: 20px;
  }
  /* 施設ツールチップ（押している間だけ表示） */
  .stats-tooltip {
    position: fixed; left: 50%; top: 14%;
    transform: translateX(-50%);
    background: rgba(255,253,249,0.97);
    border-radius: 18px; padding: 14px 22px;
    box-shadow: 0 4px 28px rgba(80,40,20,0.22);
    z-index: 500; text-align: center;
    min-width: 200px; pointer-events: none;
    border: 2px solid rgba(109,76,65,0.1);
  }
  .stats-tooltip.hidden { display: none; }
  .tt-head  { font-size: 1.2rem; font-weight: 900; color: var(--soil2); margin-bottom: 8px; }
  .tt-row   { font-size: 0.92rem; color: #795548; font-weight: 700; margin-bottom: 4px; }
  .tt-total { font-size: 1rem; font-weight: 900; color: var(--green); margin-top: 6px; }

  /* タップボタン */
  .tap-area { flex: 1; display: flex; justify-content: center; align-items: center; }
  .tap-btn {
    background: none; border: none; cursor: pointer;
    font-size: 5.5rem; line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(80,40,20,0.18));
    transition: transform 0.1s cubic-bezier(.3,1.8,.5,1), filter 0.1s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    position: relative; padding: 8px; border-radius: 50%;
  }
  .tap-btn:active { transform: scale(0.88); filter: drop-shadow(0 2px 4px rgba(80,40,20,0.10)); }
  .tap-btn .tap-hint {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    font-size: 0.9rem; color: #a1887f; white-space: nowrap; font-weight: 700;
  }

  /* フロートテキスト */
  .float-text  { position: fixed; pointer-events: none; font-size: 1.4rem; font-weight: 900; color: var(--accent); text-shadow: 0 2px 6px rgba(0,0,0,0.12); animation: floatUp 0.9s ease-out forwards; z-index: 999; }
  .float-emoji { position: fixed; pointer-events: none; font-size: 1.8rem; line-height: 1; animation: floatEmoji 1.1s ease-out forwards; z-index: 998; }
  @keyframes floatUp    { 0% { opacity:1; transform: translateY(0) scale(1); } 100% { opacity:0; transform: translateY(-70px) scale(0.7); } }
  @keyframes floatEmoji { 0% { opacity:1; transform: translateY(0) scale(1) rotate(0deg); } 100% { opacity:0; transform: translateY(-90px) scale(0.6) rotate(20deg); } }

  /* ========== ボトムバー ========== */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(255,255,255,0.96); border-top: 2px solid rgba(109,76,65,0.12);
    box-shadow: 0 -4px 20px rgba(80,40,20,0.13);
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  /* ボトムバー：2ボタン */
  .bottom-bar-btns { display: flex; gap: 10px; }
  .bar-btn {
    flex: 1; background: rgba(255,255,255,0.7);
    border: 2px solid rgba(109,76,65,0.18); border-radius: 18px;
    padding: 13px 8px; font-family: inherit;
    font-size: 1rem; font-weight: 900; color: var(--soil2);
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s, transform 0.1s;
    position: relative;
  }
  .bar-btn:active { transform: scale(0.94); background: rgba(240,98,146,0.15); }
  .bar-btn.facility { border-color: rgba(67,160,71,0.4); }
  .bar-btn.upgrade  { border-color: rgba(255,160,0,0.45); }
  .bar-btn-badge {
    background: var(--accent); color: white;
    font-size: 0.72rem; font-weight: 900;
    border-radius: 20px; padding: 1px 7px;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .bar-btn-badge.gold { background: #ffa000; }
  .new-badge { background: var(--accent); color: white; font-size: 0.78rem; font-weight: 900; border-radius: 20px; padding: 1px 8px; animation: pulse 1.6s ease-in-out infinite; }

  /* ========== ボトムシート ========== */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
  .backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 400; background: #fffdf9; border-radius: 28px 28px 0 0; box-shadow: 0 -8px 40px rgba(80,40,20,0.18); transform: translateY(100%); transition: transform 0.38s cubic-bezier(.32,1.2,.5,1); max-height: 80vh; display: flex; flex-direction: column; }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 5px; background: #d7c4bb; border-radius: 3px; margin: 12px auto 0; flex-shrink: 0; }
  .sheet-title  { font-size: 1.05rem; font-weight: 900; color: var(--soil2); text-align: center; padding: 10px 0 12px; flex-shrink: 0; }
  .sheet-scroll { overflow-y: auto; padding: 0 14px 24px; -webkit-overflow-scrolling: touch; }

  .plots { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .plot-card {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px;
    border: 2px solid transparent; cursor: pointer; transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; text-align: center;
    position: relative;
  }
  .plot-card.new-card      { animation: popIn 0.4s cubic-bezier(.3,1.8,.5,1); }
  .plot-card.can-afford    { border-color: var(--accent); background: rgba(255,255,255,0.97); }
  .plot-card.cannot-afford { opacity: 0.68; }
  .plot-card.maxed-card    { opacity: 0.5; cursor: default; }
  .plot-card:not(.maxed-card):active { transform: scale(0.94); }

  /* アップグレードバッジ */
  .upgrade-badge {
    position: absolute; top: 5px; right: 5px;
    background: linear-gradient(135deg, #ffe082, #ffd54f);
    color: #e65100; font-size: 0.73rem; font-weight: 900;
    border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 1.6s ease-in-out infinite;
    touch-action: manipulation; cursor: pointer; z-index: 10;
    box-shadow: 0 2px 6px rgba(255,160,0,0.4);
  }
  .upgrade-badge.cannot-afford { background: #e0e0e0; color: #9e9e9e; animation: none; box-shadow: none; }

  .plot-icon    { font-size: 2rem; line-height: 1.2; }
  .plot-name    { font-size: 0.95rem; font-weight: 700; color: var(--soil2); }
  .plot-rate    { font-size: 0.85rem; color: var(--green); font-weight: 700; }
  .plot-cost    { font-size: 0.88rem; font-weight: 700; color: var(--accent); background: #fce4ec; border-radius: 20px; padding: 2px 12px; margin-top: 2px; }
  .plot-cost.disabled    { color: #aaa; background: #f0f0f0; }
  .plot-cost.maxed-label { color: #9e9e9e; background: #eeeeee; }
  .plot-owned    { font-size: 0.82rem; color: #795548; font-weight: 700; }
  .plot-upgrade  { font-size: 0.8rem; color: #ff8f00; font-weight: 700; }

  /* きらきらたね */
  .golden-seed {
    position: fixed; font-size: 2.6rem; z-index: 500;
    cursor: pointer; touch-action: manipulation;
    animation: goldenDrift 11s linear forwards;
    filter: drop-shadow(0 0 10px gold) drop-shadow(0 0 20px #ffeb3b);
  }
  @keyframes goldenDrift {
    from { transform: translateX(-100px) rotate(0deg) scale(1); }
    to   { transform: translateX(calc(100vw + 100px)) rotate(360deg) scale(1); }
  }

  /* ひとこと（背景を流れる） */
  .flavor-drift {
    position: fixed; pointer-events: none; z-index: 2;
    font-size: 1rem; font-weight: 700;
    color: rgba(255,255,255,0.78);
    text-shadow: 0 1px 6px rgba(0,0,0,0.28);
    white-space: nowrap;
    animation: flavorDrift var(--dur, 28s) linear forwards;
  }
  @keyframes flavorDrift {
    0%   { opacity: 0;   transform: translateX(calc(100vw + 20px)); }
    8%   { opacity: 1; }
    88%  { opacity: 1; }
    100% { opacity: 0;   transform: translateX(-110%); }
  }

  @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  /* トースト */
  .toast { position: fixed; bottom: calc(120px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(60px); background: var(--soil2); color: white; border-radius: 30px; padding: 12px 24px; font-size: 0.9rem; font-weight: 700; box-shadow: 0 6px 24px rgba(0,0,0,0.2); z-index: 1000; transition: transform 0.4s cubic-bezier(.3,1.4,.5,1), opacity 0.4s; opacity: 0; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="garden-layer" id="gardenLayer"></div>

<div class="wrapper">

  <!-- 種カウンター -->
  <div class="seed-bar" style="flex-direction:column;align-items:stretch;gap:6px;">
    <div>
      <div class="seed-count" id="seedCount">🌱 0</div>
      <div class="seed-sub"   id="seedSub"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <div class="per-sec" id="perSec">+0 / びょう</div>
      <div class="star-pill hidden" id="starDisplay" onclick="openPrestigeModal()">🌟 ×0</div>
    </div>
  </div>

  <!-- タップボタン -->
  <div class="tap-area">
    <button class="tap-btn" id="tapBtn"
      onclick="tap(event)"
      onpointerdown="startHold(event)"
      onpointerup="stopHold()"
      onpointerleave="stopHold()"
      onpointercancel="stopHold()">
      🏠
      <span class="tap-hint">タップ・長おし！</span>
    </button>
  </div>

</div>

<!-- ほしのたねモーダル -->
<div class="prestige-overlay hidden" id="prestigeOverlay">
  <div class="prestige-modal">
    <h2>🌟 ほしのたねをあつめる</h2>
    <p>たくさんのたねをかき集めると、<br>ほしのたねが生まれるよ！<br><br>種と施設・強化はリセットされるけど、<br>ほしのたねがあるかぎり、ずっとつよいまま。</p>
    <div class="prestige-gain" id="prestigeGain2"></div>
    <button class="modal-btn confirm" onclick="doPrestige()">あつめる！ 🌟</button>
    <button class="modal-btn cancel"  onclick="closePrestigeModal()">まだつづける</button>
  </div>
</div>

<!-- アップグレード確認モーダル -->
<div class="info-overlay hidden" id="upgradeOverlay">
  <div class="info-modal">
    <div class="info-icon"   id="upgradeIcon"></div>
    <div class="info-title"  id="upgradeTitle"></div>
    <div class="info-effect" id="upgradeEffect"></div>
    <div class="info-cost"   id="upgradeCost"></div>
    <button class="modal-btn confirm" id="upgradeConfirmBtn" onclick="confirmUpgradeModal()"></button>
    <button class="modal-btn cancel"  onclick="closeUpgradeModal()">やめる</button>
  </div>
</div>

<!-- 施設ツールチップ（押している間だけ表示） -->
<div class="stats-tooltip hidden" id="statsTooltip">
  <div class="tt-head"  id="ttHead"></div>
  <div class="tt-row"   id="ttOwned"></div>
  <div class="tt-row"   id="ttRate"></div>
  <div class="tt-row"   id="ttPct"></div>
  <div class="tt-total" id="ttTotal"></div>
</div>

<!-- ボトムバー -->
<div class="bottom-bar" id="bottomBar">
  <div class="bottom-bar-btns">
    <button class="bar-btn facility" onclick="openSheet('facility')">
      🏡 しせつをかう
      <span class="bar-btn-badge" id="newBadge" style="display:none">あたらしい！</span>
    </button>
    <button class="bar-btn upgrade" onclick="openSheet('upgrade')">
      ⭐ パワーアップ
      <span class="bar-btn-badge gold" id="upgBadge" style="display:none"></span>
    </button>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">🏡 しせつをかう</div>
  <div class="sheet-scroll">
    <div class="plots" id="plotList"></div>
    <div class="plots" id="upgradeList" style="display:none"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 施設定義（CC準拠・16種）=====
const PLOTS = [
  { id: 'pot',       name: 'うえきばち',        icon: '🪴', img: 'flower_pot.png', perSec: 0.1,         baseCost: 15 },
  { id: 'flower',    name: 'たねやさん',        icon: '🌱', perSec: 0.8,         baseCost: 100 },
  { id: 'veggie',    name: 'やさいのうじょう',  icon: '🥕', perSec: 6,           baseCost: 1100 },
  { id: 'tree',      name: 'くだもののうえん',  icon: '🌳', perSec: 28,          baseCost: 12000 },
  { id: 'garden',    name: 'おにわ',            icon: '🏡', perSec: 130,         baseCost: 130000 },
  { id: 'pond',      name: 'ようほうじょ',      icon: '🐝', perSec: 700,         baseCost: 1400000 },
  { id: 'neighbor',  name: 'となりのにわ',      icon: '🏘️', perSec: 3900,        baseCost: 20000000 },
  { id: 'honey',     name: 'たね加工工場',      icon: '🏭', perSec: 22000,       baseCost: 330000000 },
  { id: 'mountain',  name: 'やまのうじょう',    icon: '🗻', perSec: 130000,      baseCost: 5100000000 },
  { id: 'rainbow',   name: 'たね研究所',        icon: '🔬', perSec: 780000,      baseCost: 75000000000 },
  { id: 'sunflower', name: 'ひまわりのうじょう', icon: '🌻', perSec: 4400000,    baseCost: 1000000000000 },
  { id: 'mushroom',  name: 'きのこ農場',        icon: '🍄', perSec: 26000000,    baseCost: 14000000000000 },
  { id: 'rice',      name: 'たんぼ農家',        icon: '🌾', perSec: 160000000,   baseCost: 170000000000000 },
  { id: 'cloud',     name: 'そら農場',          icon: '🛸', perSec: 1000000000,  baseCost: 2100000000000000 },
  { id: 'planet',    name: '宇宙農場',          icon: '🚀', perSec: 6500000000,  baseCost: 26000000000000000 },
  { id: 'earth',     name: '惑星農業機構',      icon: '🌍', perSec: 40000000000, baseCost: 310000000000000000 },
];

// 画像またはアイコン絵文字を返すヘルパー
function plotIconHtml(plot, sizePx) {
  if (plot.img) return `<img src="${plot.img}" style="width:${sizePx}px;height:${sizePx}px;object-fit:contain;vertical-align:middle;image-rendering:pixelated;pointer-events:none;user-select:none;-webkit-user-select:none" draggable="false" oncontextmenu="return false">`;
  return plot.icon;
}

const UPGRADE_TIERS = [
  { threshold: 1,  costMult: 5,    label: 'Lv.1' },
  { threshold: 5,  costMult: 50,   label: 'Lv.2' },
  { threshold: 25, costMult: 500,  label: 'Lv.3' },
  { threshold: 50, costMult: 5000, label: 'Lv.4' },
];
const MAX_OWNED = 50;
const OFFLINE_CAP_SEC = 2 * 60 * 60;

// ===== 背景ステージ（7段階・16種対応）=====
const STAGES = [
  { bg: 'linear-gradient(180deg, #546e7a 0%, #78909c 35%, #90a4ae 65%, #b0bec5 100%)', emojis: ['🌧️','☁️','🌧️','💧'] },
  { bg: 'linear-gradient(180deg, #7986cb 0%, #9fa8da 35%, #c5cae9 65%, #e8eaf6 100%)', emojis: ['⛅','🌥️','☁️','🌥️'] },
  { bg: 'linear-gradient(180deg, #29b6f6 0%, #81d4fa 35%, #b3e5fc 65%, #e1f5fe 100%)', emojis: ['☀️','🌤️','🌱','☀️'] },
  { bg: 'linear-gradient(180deg, #26c6da 0%, #80deea 35%, #ffe082 65%, #f1f8e9 100%)', emojis: ['🌸','🌼','🦋','🌸'] },

  { bg: 'linear-gradient(180deg, #7e57c2 0%, #ba68c8 35%, #f48fb1 65%, #fff9c4 100%)', emojis: ['🌙','⭐','🌟','💫'] },

function getStageIndex(n) {
  if (n >= 16) return 6;
  if (n >= 13) return 5;
  if (n >= 10) return 4;
  if (n >= 7)  return 3;
  if (n >= 4)  return 2;
  if (n >= 2)  return 1;
  return 0;
}
let currentStageIdx = -1;
function applyStage(idx) {
  if (idx === currentStageIdx) return;
  currentStageIdx = idx;
  document.body.style.background = STAGES[idx].bg;
  renderGardenLayer();
}

// ===== はたけビュー =====
const GARDEN_ZONE = {
  // 地面付近（下60〜85%）
  pot: 0.72,  veggie: 0.80, sunflower: 0.76, rice: 0.84,
  // 中低（45〜65%）
  flower: 0.60, pond: 0.65,  mushroom: 0.50, garden: 0.55,
  // 中（30〜45%）
  tree: 0.42,  neighbor: 0.35,
  // 中高（15〜30%）
  honey: 0.28, mountain: 0.22,
  // 空（0〜15%）
  rainbow: 0.18, cloud: 0.12, planet: 0.07, earth: 0.03
};
// 一貫したx位置のための簡易ハッシュ
function seedHash(str, salt) {
  let h = salt * 0x9e3779b9;
  for (let i = 0; i < str.length; i++) h = Math.imul(h ^ str.charCodeAt(i), 0x517cc1b7);
  return Math.abs(h);
}
let gardenIconEls = [];

function renderGardenLayer() {
  const layer = document.getElementById('gardenLayer');
  layer.innerHTML = '';
  gardenIconEls = [];

  // 流れる絵文字（旧 .clouds）
  const stageEmojis = STAGES[currentStageIdx >= 0 ? currentStageIdx : 0].emojis;
  const durations = [26, 38, 31, 44];
  const delays    = [0, -14, -22, -8];
  const sizes     = [2.2, 1.6, 2.2, 1.4];
  const tops      = [8, 40, 14, 55];
  stageEmojis.forEach((em, i) => {
    const el = document.createElement('span');
    el.className = 'cloud';
    el.textContent = em;
    el.style.cssText = `top:${tops[i]}px; font-size:${sizes[i]}rem; animation-duration:${durations[i]}s; animation-delay:${delays[i]}s;`;
    layer.appendChild(el);
  });

  // 施設アイコン（所持数と同数・横一列・互い違いに上下ずらし）
  PLOTS.forEach(plot => {
    const owned = state.plots[plot.id] || 0;
    if (owned === 0) return;

    const yFrac   = GARDEN_ZONE[plot.id] ?? 0.6;
    const yBase   = window.innerHeight * yFrac;

    // 個数に応じてアイコンサイズを縮小（最小0.75rem）
    const remSize = Math.max(0.75, 2.0 - owned * 0.028);
    const pxSize  = Math.round(remSize * 16); // px換算（img用）

    // 上下ずらし量（アイコンが小さくなるほど縮小）
    const zigzag  = Math.round(remSize * 9);

    for (let i = 0; i < owned; i++) {
      const el = document.createElement('span');
      el.className = 'garden-icon';
      el.innerHTML = plotIconHtml(plot, pxSize);

      // x: 左2%〜右98%に等間隔配置
      const xPct = owned === 1 ? 50 : 2 + (i / (owned - 1)) * 96;
      // y: 偶数インデックス=基準位置、奇数=少し下にずらす
      const yPx  = yBase + (i % 2 === 0 ? 0 : zigzag);

      el.style.left        = `${xPct.toFixed(1)}%`;
      el.style.top         = `${yPx}px`;
      el.style.fontSize    = `${remSize.toFixed(2)}rem`;
      el.style.pointerEvents = 'auto';
      el.style.cursor      = 'pointer';
      el.style.touchAction = 'manipulation';
      el.addEventListener('pointerdown',   (e) => { e.stopPropagation(); showStatsTooltip(plot.id); });
      el.addEventListener('pointerup',     hideStatsTooltip);
      el.addEventListener('pointercancel', hideStatsTooltip);
      el.addEventListener('pointerleave',  hideStatsTooltip);
      layer.appendChild(el);
      gardenIconEls.push({ el, plotId: plot.id });
    }
  });
}

// パーティクル発射（施設から生産数が飛ぶ）
const GARDEN_PARTICLES = ['🌱','✨','🌸','💧'];
setInterval(() => {
  if (gardenIconEls.length === 0) return;
  const item = gardenIconEls[Math.floor(Math.random() * gardenIconEls.length)];
  const rect = item.el.getBoundingClientRect();
  if (rect.width === 0) return;

  const plot = PLOTS.find(p => p.id === item.plotId);
  const owned = state.plots[item.plotId] || 0;
  const countShown = Math.min(owned, 5);
  const prodPerIcon = plot.perSec * owned * getMultiplier(item.plotId) * getPrestigeMultiplier() / countShown;
  // 1.8秒分の生産量（アイコン1個あたり）
  const gained = Math.floor(prodPerIcon * 1.8);

  const ef = document.createElement('div');
  if (gained >= 1) {
    ef.className = 'float-text';
    ef.textContent = '+' + formatNum(gained);
    ef.style.fontSize = '0.95rem';
  } else {
    ef.className = 'float-emoji';
    ef.textContent = GARDEN_PARTICLES[Math.floor(Math.random() * GARDEN_PARTICLES.length)];
  }

  ef.style.top  = rect.top + 'px';
  document.body.appendChild(ef);

// ===== 状態 =====
let state = { seeds: 0, plots: {}, upgrades: {}, totalSeeds: 0, stars: 0, prestiges: 0 };

function save() {
  try {
    localStorage.setItem('garden_save', JSON.stringify(state));
    localStorage.setItem('garden_saved_at', Date.now().toString());
  } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem('garden_save');
    if (d) state = JSON.parse(d);
  } catch(e){}
}
function migrate() {
  if (!state.plots)        state.plots        = {};
  if (!state.upgrades)     state.upgrades     = {};
  if (!state.totalSeeds)   state.totalSeeds   = state.seeds || 0;
  if (!state.stars)        state.stars        = 0;
  if (!state.prestiges)    state.prestiges    = 0;
  if (!state.plotProduced) state.plotProduced = {};
}
function applyOfflineIncome() {
  const savedAt = parseInt(localStorage.getItem('garden_saved_at') || '0', 10);
  if (!savedAt) return;
  const elapsed = Math.min((Date.now() - savedAt) / 1000, OFFLINE_CAP_SEC);
  if (elapsed < 10) return;
  const gained = Math.floor(getTotalPerSec() * elapsed);
  if (gained <= 0) return;
  state.seeds += gained;
  state.totalSeeds += gained;
  const mins = Math.floor(elapsed / 60);
  const timeStr = mins >= 60 ? '2じかんぶん' : mins + 'ふんぶん';
  setTimeout(() => showToast('🌙 おるすのあいだに ' + timeStr + ' +' + formatNum(gained) + 'たね！'), 800);
}
load(); migrate(); applyOfflineIncome();

// ===== ゲームロジック =====
function getCost(plot) {
  return Math.floor(plot.baseCost * Math.pow(1.15, state.plots[plot.id] || 0));
}
function getPrestigeMultiplier() {
  return 1 + state.stars * 0.01;
}
function getMultiplier(plotId) {
  return UPGRADE_TIERS.reduce((m, t) => state.upgrades[plotId + '_' + t.threshold] ? m * 2 : m, 1);
}
function getUnlockedPlots() {
  return PLOTS.filter((p, i) => i === 0 || (state.plots[PLOTS[i-1].id] || 0) >= 1);
}
function getTotalPerSec() {
  const pm = getPrestigeMultiplier();
  const base = PLOTS.reduce((sum, p) => {
    const owned = state.plots[p.id] || 0;
    return sum + p.perSec * owned * getMultiplier(p.id) * pm;
  }, 0);
  // うえきばちの自動タップボーナス（Thousand fingers準拠）
  // うえきばち1個 = 0.1タップ/秒 × perClick相当
  const potOwned = state.plots['pot'] || 0;
  const autoTapBonus = potOwned * 0.1 * getPerClick() * pm * getMultiplier('pot');
  return base + autoTapBonus;
}
function getPerClick() {
  return Math.max(1, Math.pow(2, getUnlockedPlots().length - 1));
}

// 転生
function getPotentialStars() {
  return Math.floor(Math.cbrt(state.totalSeeds / 1e6));
}
function openPrestigeModal() {
  const gain  = getPotentialStars() - state.stars;
  const total = getPotentialStars();
  const times = (state.prestiges || 0) + (gain > 0 ? 1 : 0);
  let gainText = '';
  if (gain > 0) {
    gainText = '🌟 あたらしく ' + gain + 'こ もらえるよ！\n合計 ' + total + 'こ → 生産量 +' + total + '%\n（' + times + 'かいめの あつめ）';
  } else {
    gainText = '🌟 ' + total + 'こ もってるよ（生産量 +' + total + '%）\nまだ ふやせないみたい…';
  }
  document.getElementById('prestigeGain2').textContent = gainText;
  document.getElementById('prestigeGain2').style.whiteSpace = 'pre-line';
  const btn = document.getElementById('prestigeOverlay').querySelector('.confirm');
  if (btn) { btn.disabled = gain <= 0; btn.style.opacity = gain > 0 ? '1' : '0.5'; }
  document.getElementById('prestigeOverlay').classList.remove('hidden');
}
function closePrestigeModal() {
  document.getElementById('prestigeOverlay').classList.add('hidden');
}
function doPrestige() {
  const newStars = getPotentialStars();
  if (newStars <= state.stars) return;
  state.stars     = newStars;
  state.prestiges = (state.prestiges || 0) + 1;
  state.seeds        = 0;
  state.plots        = {};
  state.upgrades     = {};
  state.plotProduced = {};
  closePrestigeModal();
  renderGardenLayer();
  save();
  update();
  showToast('🌟 ほしのたね ' + state.stars + 'こ あつまった！ 生産量 +' + state.stars + '% になったよ！');
}

// タップ処理（x,y は画面座標、省略時はボタン中央）
function tapAt(x, y) {
  const pc = getPerClick();
  state.seeds += pc;
  state.totalSeeds += pc;

  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = '+' + formatNum(pc) + '🌱';
  el.style.left = (x - 20) + 'px';
  el.style.top  = (y - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);

  const emojis = STAGES[currentStageIdx >= 0 ? currentStageIdx : 0].emojis;
  const ef = document.createElement('div');
  ef.className = 'float-emoji';
  ef.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  ef.style.left = (x - 16 + (Math.random() - 0.5) * 60) + 'px';
  ef.style.top  = (y - 30) + 'px';
  document.body.appendChild(ef);
  setTimeout(() => ef.remove(), 1100);

  update();
}

function tap(e) { tapAt(e.clientX, e.clientY); }

// 長押し自動タップ（8回/秒）
let holdInterval = null;
function startHold(e) {
  if (holdInterval) return;
  const btn = document.getElementById('tapBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;
  holdInterval = setInterval(() => tapAt(cx, cy), 125);
}
function stopHold() {
  if (holdInterval) { clearInterval(holdInterval); holdInterval = null; }
}

function buyPlot(id) {
  const plot = PLOTS.find(p => p.id === id);
  const owned = state.plots[id] || 0;
  if (owned >= MAX_OWNED) return;
  const cost = getCost(plot);
  if (state.seeds < cost) return;
  state.seeds -= cost;
  state.plots[id] = owned + 1;

  UPGRADE_TIERS.forEach(t => {
    if (owned < t.threshold && state.plots[id] >= t.threshold) {
      showToast('⭐ ' + plot.name + ' の強化が解禁！');
    }
  });
  if (state.plots[id] >= MAX_OWNED) showToast(plot.icon + ' ' + plot.name + ' がさいだいになった！');

  checkUnlock();
  renderGardenLayer();
  save();
  update();
}

function getAvailableUpgrades() {
  const result = [];
  PLOTS.forEach(plot => {
    const owned = state.plots[plot.id] || 0;
    UPGRADE_TIERS.forEach(tier => {
      const key = plot.id + '_' + tier.threshold;
      if (owned >= tier.threshold && !state.upgrades[key]) {
        result.push({ key, plot, tier, cost: Math.floor(plot.baseCost * tier.costMult) });
      }
    });
  });
  return result;
}
function buyUpgrade(key) {
  const u = getAvailableUpgrades().find(u => u.key === key);
  if (!u || state.seeds < u.cost) return;
  state.seeds -= u.cost;
  state.upgrades[key] = true;
  showToast(u.plot.icon + ' ' + u.plot.name + ' がパワーアップ！ ×2');
  save();
  update();
}

let prevUnlockedCount = 0;
let newlyUnlockedIds = new Set();
function checkUnlock() {
  const unlocked = getUnlockedPlots();
  if (unlocked.length > prevUnlockedCount) {
    for (let i = prevUnlockedCount; i < unlocked.length; i++) {
      const p = unlocked[i];
      newlyUnlockedIds.add(p.id);
      showToast(p.icon + ' ' + p.name + ' が解禁！');
    }
    prevUnlockedCount = unlocked.length;
  }
}

let lastMilestone = 0;
const milestones = [100, 1000, 10000, 100000, 1e6, 1e8, 1e10, 1e12, 1e14, 1e16];
function checkMilestone() {
  milestones.forEach(m => {
    if (state.seeds >= m && m > lastMilestone) {
      lastMilestone = m;
      showToast('🎉 ' + formatNum(m) + 'たね たまったよ！');
    }
  });
}

// ===== 数字フォーマット =====
function formatNum(n) {
  if (n >= 1e16) return (n / 1e16).toFixed(1) + '京';
  if (n >= 1e12) return (n / 1e12).toFixed(1) + '兆';
  if (n >= 1e8)  return (n / 1e8).toFixed(1)  + '億';
  return Math.floor(n).toLocaleString('ja-JP');
}
function formatSeedDisplay(n) {
  const f = Math.floor(n);
  if (f >= 1e16) {
    const kei = Math.floor(f / 1e16);
    const cho = Math.floor((f % 1e16) / 1e12);
    return { main: kei + '京' + (cho > 0 ? cho + '兆' : ''), sub: '' };
  }
  if (f >= 1e12) {
    const cho = Math.floor(f / 1e12);
    const oku = Math.floor((f % 1e12) / 1e8);
    return { main: cho + '兆' + (oku > 0 ? oku + '億' : ''), sub: '' };
  }
  if (f >= 1e8) {
    const oku  = Math.floor(f / 1e8);
    const man  = Math.floor((f % 1e8) / 1e4);
    const ichi = f % 1e4;
    let s = oku + '億';
    if (man  > 0) s += man + '万';
    if (ichi > 0) s += ichi;
    return { main: s, sub: '' };
  }
  if (f >= 1e4) {
    const man  = Math.floor(f / 1e4);
    const ichi = f % 1e4;
    return { main: man + '万' + (ichi > 0 ? ichi : ''), sub: '' };
  }
  return { main: f.toLocaleString('ja-JP'), sub: '' };
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

let currentSheetType = null;

function openSheet(type) {
  currentSheetType = type;
  document.getElementById('sheet').classList.add('show');
  document.getElementById('backdrop').classList.add('show');
  const plotList    = document.getElementById('plotList');
  const upgradeList = document.getElementById('upgradeList');
  const title       = document.getElementById('sheetTitle');
  if (type === 'facility') {
    title.textContent       = '🏡 しせつをかう';
    plotList.style.display    = '';
    upgradeList.style.display = 'none';
    newlyUnlockedIds.clear();
    document.getElementById('newBadge').style.display = 'none';
  } else {

  }
}
function closeSheet() {
  currentSheetType = null;
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('backdrop').classList.remove('show');
}

function renderUpgradeSheet() {
  const list  = document.getElementById('upgradeList');
  const avail = getAvailableUpgrades();
  const seeds = Math.floor(state.seeds);
  list.innerHTML = '';
  if (avail.length === 0) {
    const msg = document.createElement('div');
    msg.style.cssText = 'text-align:center;padding:32px 16px;color:#a1887f;font-weight:700;line-height:1.8;grid-column:1/-1';
    msg.innerHTML = 'まだ パワーアップは ないよ 🌱<br>しせつを もっと かってみてね！';
    list.appendChild(msg);
    return;
  }
  avail.forEach(u => {
    const canAfford = seeds >= u.cost;
    const mult = getMultiplier(u.plot.id);
    const card = document.createElement('div');
    card.className = 'plot-card' + (canAfford ? ' can-afford' : ' cannot-afford');
    card.onclick = () => showUpgradeModal(u.key);
    card.innerHTML = `
      <div class="plot-icon">${plotIconHtml(u.plot, 48)}</div>
      <div class="plot-name">${u.plot.name}</div>
      <div class="plot-rate">× ${mult} → × ${mult * 2} ばい</div>
      <div class="plot-cost ${canAfford ? '' : 'disabled'}">🌱${formatNum(u.cost)}</div>
    `;
    list.appendChild(card);
  });
}

// ===== 画面更新 =====
function update() {
  const seeds = Math.floor(state.seeds);
  const { main, sub } = formatSeedDisplay(seeds);
  document.getElementById('seedCount').textContent = '🌱 ' + main;
  document.getElementById('seedSub').textContent   = sub;
  document.getElementById('perSec').textContent    = '+' + formatNum(getTotalPerSec()) + ' / びょう';

  const unlocked = getUnlockedPlots();
  applyStage(getStageIndex(unlocked.length));

  // タップボタンアイコン
  const tapBtn = document.getElementById('tapBtn');
  // タップボタンは🏠固定

  // ほしのたね表示（種カウンター内）
  const potStars    = getPotentialStars();
  const canPrestige = potStars > state.stars;
  const starEl = document.getElementById('starDisplay');
  if (state.stars > 0 || canPrestige) {
    starEl.classList.remove('hidden');
    starEl.textContent = '🌟 ×' + state.stars;
    if (canPrestige) starEl.classList.add('can-prestige');
    else             starEl.classList.remove('can-prestige');
  } else {
    starEl.classList.add('hidden');
  }

  // ---- ボトムバーバッジ ----
  const hasNew = newlyUnlockedIds.size > 0;
  document.getElementById('newBadge').style.display = hasNew ? '' : 'none';

  // アップグレード件数バッジ
  const availUpgCount = getAvailableUpgrades().length;
  const upgBadge = document.getElementById('upgBadge');
  if (availUpgCount > 0) {
    upgBadge.textContent = availUpgCount + '件';
    upgBadge.style.display = '';
  } else {
    upgBadge.style.display = 'none';
  }

  // アップグレードシートが開いていれば再描画
  if (currentSheetType === 'upgrade') renderUpgradeSheet();

  // ---- シート内グリッド ----
  const list = document.getElementById('plotList');
  const existingIds = new Set(Array.from(list.querySelectorAll('.plot-card')).map(el => el.dataset.id));
  const availUpgrades = getAvailableUpgrades();
  const upgradeMap = {};
  availUpgrades.forEach(u => { if (!upgradeMap[u.plot.id]) upgradeMap[u.plot.id] = u; });

  unlocked.forEach(plot => {
    const owned     = state.plots[plot.id] || 0;
    const isMaxed   = owned >= MAX_OWNED;
    const cost      = getCost(plot);
    const canAfford = !isMaxed && seeds >= cost;
    const mult      = getMultiplier(plot.id);
    const upg       = upgradeMap[plot.id];
    const upgAfford = upg && seeds >= upg.cost;

    let card = list.querySelector(`[data-id="${plot.id}"]`);
    if (!card) {
      card = document.createElement('div');
      card.dataset.id = plot.id;
      list.appendChild(card);
    }

    card.className = 'plot-card' +
      (!existingIds.has(plot.id) ? ' new-card' : '') +
      (isMaxed ? ' maxed-card' : canAfford ? ' can-afford' : ' cannot-afford');
    card.onclick = isMaxed ? null : () => buyPlot(plot.id);

    const badgeHtml = upg
      ? `<div class="upgrade-badge${upgAfford ? '' : ' cannot-afford'}" onclick="event.stopPropagation();showUpgradeModal('${upg.key}')">⭐</div>`
      : '';

    const costHtml = isMaxed
      ? `<div class="plot-cost maxed-label">さいだい</div>`
      : `<div class="plot-cost ${canAfford ? '' : 'disabled'}">🌱${formatNum(cost)}</div>`;

    const pm = getPrestigeMultiplier();
    card.innerHTML = `
      ${badgeHtml}
      <div class="plot-icon">${plotIconHtml(plot, 48)}</div>
      <div class="plot-name">${plot.name}</div>
      <div class="plot-rate">+${formatNum(plot.perSec * mult * pm)}/びょう</div>
      ${owned > 0 ? `<div class="plot-owned">もってる：${owned}こ</div>` : ''}
      ${mult > 1 ? `<div class="plot-upgrade">⭐×${mult}</div>` : ''}
      ${costHtml}
    `;
  });

  const unlockedIds = new Set(unlocked.map(p => p.id));
  list.querySelectorAll('.plot-card').forEach(card => { if (!unlockedIds.has(card.dataset.id)) card.remove(); });
}

// ===== アップグレード確認モーダル =====
let pendingUpgradeKey = null;
function showUpgradeModal(key) {
  const u = getAvailableUpgrades().find(u => u.key === key);
  if (!u) return;
  pendingUpgradeKey = key;
  const canAfford = state.seeds >= u.cost;
  const mult = getMultiplier(u.plot.id);
  document.getElementById('upgradeIcon').textContent   = u.plot.icon;
  document.getElementById('upgradeTitle').textContent  = u.plot.name + ' を つよくする';
  document.getElementById('upgradeEffect').textContent = '⭐ せいさん × ' + mult + ' → × ' + (mult * 2) + ' ばい！';
  document.getElementById('upgradeCost').textContent   = '🌱 ' + formatNum(u.cost) + ' たね';
  const btn = document.getElementById('upgradeConfirmBtn');
  btn.textContent = canAfford ? 'かう！ ⭐' : 'たねが たりない…';
  btn.style.opacity = canAfford ? '1' : '0.5';
  btn.disabled = !canAfford;
  document.getElementById('upgradeOverlay').classList.remove('hidden');
}
function closeUpgradeModal() {
  document.getElementById('upgradeOverlay').classList.add('hidden');
  pendingUpgradeKey = null;
}
function confirmUpgradeModal() {
  if (pendingUpgradeKey) { buyUpgrade(pendingUpgradeKey); }
  closeUpgradeModal();
}

// ===== 施設ツールチップ（押している間だけ・リアルタイム更新） =====
let statsTooltipTimer = null;
let activeStatsId = null;

function updateStatsTooltip() {
  if (!activeStatsId) return;
  const plot  = PLOTS.find(p => p.id === activeStatsId);
  const owned = state.plots[activeStatsId] || 0;
  const pm    = getPrestigeMultiplier();
  const mult  = getMultiplier(activeStatsId);
  const perSec   = plot.perSec * owned * mult * pm;
  const totalPS  = getTotalPerSec();
  const pct      = totalPS > 0 ? (perSec / totalPS * 100) : 0;
  const pctStr   = pct >= 0.1 ? pct.toFixed(1) + '%' : '< 0.1%';
  const total    = Math.floor(state.plotProduced[activeStatsId] || 0);
  document.getElementById('ttHead').textContent  = plot.icon + ' ' + plot.name;
  document.getElementById('ttOwned').textContent = 'もってる：' + owned + 'こ';
  document.getElementById('ttRate').textContent  = '+' + formatNum(perSec) + ' / びょう';
  document.getElementById('ttPct').textContent   = 'ぜんたいの ' + pctStr + ' をたんとう';
  document.getElementById('ttTotal').textContent = 'ごうけい ' + formatNum(total) + ' たね';
}

function showStatsTooltip(plotId) {
  activeStatsId = plotId;
  updateStatsTooltip();
  document.getElementById('statsTooltip').classList.remove('hidden');
  clearInterval(statsTooltipTimer);
  statsTooltipTimer = setInterval(updateStatsTooltip, 200);
}

function hideStatsTooltip() {
  activeStatsId = null;
  document.getElementById('statsTooltip').classList.add('hidden');
  clearInterval(statsTooltipTimer);
  statsTooltipTimer = null;
}

prevUnlockedCount = getUnlockedPlots().length;
applyStage(getStageIndex(prevUnlockedCount));
renderGardenLayer();

// ===== きらきらたね =====
let goldenActive = false;
function spawnGoldenSeed() {
  if (goldenActive) return;
  goldenActive = true;
  const el = document.createElement('div');
  el.className = 'golden-seed';
  el.textContent = '🌟';
  el.style.top = (15 + Math.random() * 55) + '%';
  el.onclick = () => {
    el.remove();
    goldenActive = false;
    const bonus = Math.floor(getTotalPerSec() * 30);
    const got = Math.max(bonus, 10);
    state.seeds += got; state.totalSeeds += got;
    showToast('🌟 きらきらたね！ +' + formatNum(got) + 'たね もらった！');
    update();
  };
  document.body.appendChild(el);
  setTimeout(() => { if (el.parentNode) { el.remove(); goldenActive = false; } }, 12000);
}
function scheduleGolden() {
  setTimeout(() => { spawnGoldenSeed(); scheduleGolden(); },
    (120 + Math.random() * 180) * 1000); // 2〜5分
}
scheduleGolden();

// ===== ひとこと =====
const FLAVOR_POOL = [
  () => 'きょうも いいてんき 🌞',
  () => '🐦 ことりが うたっている',
  () => '🍃 かぜが そっと ふいてる',
  () => 'ゆっくり そだてよう 🌱',
  () => (state.plots['flower']   > 0) ? '🌸 おはなが きれいに さいてるね' : null,
  () => (state.plots['pond']     > 0) ? '🪷 いけの みずが きらきら ひかってる' : null,
  () => (state.plots['honey']    > 0) ? '🍯 はちみつの あまい においがする' : null,
  () => (state.plots['tree']     > 0) ? '🌳 木の はっぱが そよそよ ゆれてる' : null,
  () => (state.plots['mountain'] > 0) ? '🗻 やまの くうきが おいしそう' : null,
  () => (getTotalPerSec() >= 1)  ? '🌱 たねが どんどん ふえてる！' : null,
  () => (getTotalPerSec() >= 1000) ? '✨ はたけが もりもり そだってる！' : null,
  () => (state.stars > 0)        ? '🌟 ほしのたねの ちからが みなぎってる' : null,
];
function showFlavorDrift() {
  const msgs = FLAVOR_POOL.map(f => f()).filter(Boolean);
  if (!msgs.length) return;
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  const el = document.createElement('div');
  el.className = 'flavor-drift';
  el.textContent = msg;
  // 上下は種カウンターとタップボタンの間あたり（画面の20〜40%）
  el.style.top = (20 + Math.random() * 20) + '%';
  // 長さに応じてアニメーション時間を調整（文字数 × 0.5秒 + ベース）
  const dur = Math.max(22, 18 + msg.length * 0.4);
  el.style.setProperty('--dur', dur + 's');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 1) * 1000);
  // 次のひとこと：前が半分流れたあたりで次を出す
  setTimeout(showFlavorDrift, (dur * 0.6 + Math.random() * 6) * 1000);
}
setTimeout(showFlavorDrift, 3000); // 起動3秒後から開始

let lastTime = performance.now();
function gameLoop(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  const pm = getPrestigeMultiplier();
  let earned = 0;
  PLOTS.forEach(p => {
    const owned = state.plots[p.id] || 0;
    if (owned === 0) return;
    const contrib = p.perSec * owned * getMultiplier(p.id) * pm * dt;
    earned += contrib;
    state.plotProduced[p.id] = (state.plotProduced[p.id] || 0) + contrib;
  });
  // うえきばち 自動タップボーナス
  const potOwned = state.plots['pot'] || 0;
  earned += potOwned * 0.1 * getPerClick() * pm * getMultiplier('pot') * dt;
  state.seeds      += earned;
  state.totalSeeds += earned;
  checkMilestone();
  if (Math.floor(now / 500) !== Math.floor((now - dt * 1000) / 500)) save();
  requestAnimationFrame(gameLoop);
}

setInterval(update, 200);
update();
requestAnimationFrame(gameLoop);
</script>
